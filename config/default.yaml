paths:
  data_root: data
  snapshots: data/snapshots
  references: data/references
  documents: data/documents
  indexes: data/indexes
  reports: data/reports
  logs: data/logs

http:
  timeout_seconds: 30.0
  retries: 3
  backoff_initial_seconds: 1.0
  backoff_max_seconds: 30.0
  user_agent: "clinrecparse/0.1 contact: local-development"
  circuit_breaker_5xx_threshold: 5

rate_limit:
  requests_per_second: 2.0

concurrency:
  default: 1
  max: 2

discovery:
  unavailable_retry_ttl_days: 7

bank:
  max_catalog_drop_percent: 5
  max_identity_conflicts: 0
  require_manual_apply_on_removed: true

logging:
  level: INFO
  jsonl_path: data/logs/clinrec.jsonl
